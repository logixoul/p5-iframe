<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            height: 100%;
            font-family: sans-serif;
        }

        .app {
            display: grid;
            grid-template-columns: 40% 60%;
            height: 100%;
        }

        .editor-pane, .preview-pane {
            min-height: 0;
        }

        .editor-pane {
            border-right: 1px solid #ccc;
            display: grid;
            grid-template-rows: auto 1fr;
        }

        .toolbar {
            padding: 10px;
            border-bottom: 1px solid #ccc;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        button {
            padding: 6px 10px;
            cursor: pointer;
        }

        #status { min-height: 1em; }

        textarea {
            width: 100%;
            height: 100%;
            border: 0;
            margin: 0;
            padding: 12px;
            resize: none;
            font-family: monospace;
            outline: none;
        }

        #runnerFrame {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
        }
    </style>
</head>
<body>
    <div class="app">
        <section class="editor-pane">
            <div class="toolbar">
                <button id="runBtn" type="button">Run</button>
                <span id="status"></span>
            </div>
            <textarea id="codeEditor" spellcheck="false"></textarea>
        </section>
        <section class="preview-pane">
            <iframe id="runnerFrame" src="inner-iframe.html" title="Sketch preview"></iframe>
        </section>
    </div>

    <script>
        const defaultCode = [
            "function setup() {",
            "  createCanvas(windowWidth, windowHeight);",
            "  noStroke();",
            "}",
            "",
            "function draw() {",
            "  background(244, 242, 234);",
            "  fill(198, 81, 2);",
            "  circle(width * 0.5 + sin(frameCount * 0.03) * 140, height * 0.5, 80);",
            "}",
            "",
            "function windowResized() {",
            "  resizeCanvas(windowWidth, windowHeight);",
            "}"
        ].join("\n");

        const editor = document.getElementById("codeEditor");
        const runBtn = document.getElementById("runBtn");
        const statusEl = document.getElementById("status");
        const frame = document.getElementById("runnerFrame");

        function setStatus(text) {
            statusEl.textContent = text;
        }

        function runCurrentCode() {
            if (!frame.contentWindow) {
                setStatus("Error: runner not ready");
                return;
            }
            frame.contentWindow.postMessage({ type: "run-sketch", code: editor.value }, "*");
        }

        editor.value = defaultCode;
        runBtn.addEventListener("click", runCurrentCode);

        window.addEventListener("message", (event) => {
            const data = event.data;
            if (!data || typeof data !== "object") {
                return;
            }
            if (data.type === "runtime-ok") {
                setStatus("");
            }
            if (data.type === "runtime-error") {
                setStatus(`Error: ${data.message || "Unknown error"}`);
            }
        });
    </script>
</body>
</html>
