<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title></title>
    <style>
        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            height: 100%;
            font-family: sans-serif;
        }

        .app {
            height: 100%;
        }

        .editor-pane, .preview-pane {
            min-height: 0;
            height: 100%;
        }

        .editor-pane {
            display: grid;
            grid-template-rows: auto 1fr;
        }

        .toolbar {
            padding: 10px;
            border-bottom: 1px solid #ccc;
            display: flex;
            gap: 8px;
            align-items: center;
        }

        button {
            padding: 6px 10px;
            cursor: pointer;
        }

        #status { min-height: 1em; }

        textarea {
            width: 100%;
            height: 100%;
            border: 0;
            margin: 0;
            padding: 12px;
            resize: none;
            font-family: monospace;
            outline: none;
        }

        #runnerFrame {
            width: 100%;
            height: 100%;
            border: 0;
            display: block;
        }

        .preview-pane {
            position: relative;
        }

        #codeToggleBtn {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="app">
        <section class="editor-pane">
            <div class="toolbar">
                <button id="runBtn" type="button">Run</button>
                <span id="status"></span>
            </div>
            <textarea id="codeEditor" spellcheck="false"></textarea>
        </section>
        <section class="preview-pane">
            <button id="codeToggleBtn" type="button">Code</button>
            <iframe
                id="runnerFrame"
                src="inner-iframe.html"
                title="Sketch preview"
                allow="accelerometer; gyroscope; magnetometer"
            ></iframe>
        </section>
    </div>

    <script>
        const editor = document.getElementById("codeEditor");
        const runBtn = document.getElementById("runBtn");
        const statusEl = document.getElementById("status");
        const frame = document.getElementById("runnerFrame");
        const codeToggleBtn = document.getElementById("codeToggleBtn");
        const previewPane = document.querySelector(".preview-pane");
        const editorPane = document.querySelector(".editor-pane");
        let runnerReadyResolve = null;
        let runnerReadyPromise = createRunnerReadyPromise();

        function createRunnerReadyPromise() {
            return new Promise((resolve) => {
                runnerReadyResolve = resolve;
            });
        }

        function setStatus(text) {
            statusEl.textContent = text;
        }

        function setMode(mode) {
            if (mode === "preview") {
                previewPane.style.display = "block";
                editorPane.style.display = "none";
            } else if (mode === "code") {
                previewPane.style.display = "none";
                editorPane.style.display = "grid";
            }
        }

        function runCurrentCode() {
            if (!frame.contentWindow) {
                setStatus("Error: runner not ready");
                return;
            }
            frame.contentWindow.postMessage({ type: "run-sketch", code: editor.value }, "*");
            setMode("preview");
        }

        frame.addEventListener("load", () => {
            runnerReadyPromise = createRunnerReadyPromise();
        });

        runBtn.addEventListener("click", runCurrentCode);
        codeToggleBtn.addEventListener("click", () => {
            setMode("code");
        });
        setMode("preview");

        async function loadSketchFromQuery() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get("id");

            if (!/^[A-Za-z0-9_-]+$/.test(id)) {
                setStatus("Error: invalid sketch id");
                return;
            }

            try {
                const response = await fetch(`${id}.js`);
                if (!response.ok) {
                    throw new Error(`Failed to load ${id}.js`);
                }

                editor.value = await response.text();
                await runnerReadyPromise;
                runCurrentCode();
            } catch (error) {
                setStatus(`Error: ${error.message || "Unable to load sketch"}`);
            }
        }

        loadSketchFromQuery();

        window.addEventListener("message", (event) => {
            const data = event.data;
            if (!data || typeof data !== "object") {
                return;
            }
            if (data.type === "runner-ready") {
                if (runnerReadyResolve) {
                    runnerReadyResolve();
                    runnerReadyResolve = null;
                }
                return;
            }
            if (data.type === "runtime-ok") {
                setStatus("");
            }
            if (data.type === "runtime-error") {
                setStatus(`Error: ${data.message || "Unknown error"}`);
                setMode("code");
            }
        });
    </script>
</body>
</html>
